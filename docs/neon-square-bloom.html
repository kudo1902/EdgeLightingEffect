<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Square — HDR Bloom Post-Process</title>
<style>
  :root { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#08080a; overflow:hidden;
    font-family:"SF Mono","JetBrains Mono",ui-monospace,monospace; }
  #gl { display:block; width:100vw; height:100vh; }
  .panel { position:fixed; top:16px; left:16px; z-index:10; width:258px;
    background:rgba(12,12,16,0.74); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:15px 17px;
    box-shadow:0 8px 40px rgba(0,0,0,0.55); transition:transform .25s,opacity .25s; }
  .panel.hidden { transform:translateX(-112%); opacity:0; }
  .panel h1 { font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:#8b8b96; font-weight:600; margin-bottom:4px; }
  .panel .sub { font-size:9px; color:#55555f; letter-spacing:.5px; margin-bottom:14px; }
  .group { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#5e5e6a;
    margin:14px 0 9px; padding-bottom:5px; border-bottom:1px solid rgba(255,255,255,0.06); }
  .row { margin-bottom:11px; }
  .row label { display:flex; justify-content:space-between; font-size:11px; color:#b8b8c4;
    margin-bottom:5px; letter-spacing:.3px; }
  .row label span { color:#6e6e7a; font-variant-numeric:tabular-nums; }
  input[type=range] { -webkit-appearance:none; width:100%; height:3px;
    background:rgba(255,255,255,0.12); border-radius:2px; outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px;
    border-radius:50%; background:linear-gradient(135deg,#ff5e3a,#5e7bff); cursor:pointer;
    box-shadow:0 0 8px rgba(120,120,255,0.6); }
  input[type=range]::-moz-range-thumb { width:13px; height:13px; border:none; border-radius:50%;
    background:#6e7bff; cursor:pointer; }
  .seg { display:flex; gap:5px; margin-bottom:6px; }
  .seg button { flex:1; font:inherit; font-size:10px; padding:6px 0; color:#c4c4d0;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
    border-radius:7px; cursor:pointer; letter-spacing:.3px; transition:all .15s; }
  .seg button:hover { background:rgba(255,255,255,0.12); color:#fff; }
  .seg button.active { background:rgba(110,123,255,0.22);
    border-color:rgba(110,123,255,0.5); color:#fff; }
  .toggle { display:flex; align-items:center; justify-content:space-between; font-size:11px;
    color:#b8b8c4; cursor:pointer; margin-top:4px; }
  .toggle input { accent-color:#6e7bff; width:15px; height:15px; cursor:pointer; }
  .hint { position:fixed; bottom:13px; left:16px; z-index:10; font-size:10px; color:#45454f;
    letter-spacing:.5px; }
  .hint kbd { background:rgba(255,255,255,0.08); padding:1px 5px; border-radius:4px; color:#8b8b96; }
  .badge { position:fixed; bottom:13px; right:16px; z-index:10; font-size:10px; color:#45454f; }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="panel" id="panel">
  <h1>Neon · HDR Bloom</h1>
  <div class="sub">scene → prefilter → ↓mips → ↑tent → composite</div>

  <div class="group">View</div>
  <div class="seg" id="view">
    <button data-v="0" class="active">Final</button>
    <button data-v="1">Bloom</button>
    <button data-v="2">Scene</button>
  </div>

  <div class="group">Neon source</div>
  <div class="row"><label>Độ dày <span id="vThick">2.2</span></label>
    <input type="range" id="thick" min="0.4" max="6" step="0.1" value="2.2"></div>
  <div class="row"><label>Core glow <span id="vGlow">0.9</span></label>
    <input type="range" id="glow" min="0.1" max="3" step="0.05" value="0.9"></div>
  <div class="row"><label>Bo góc <span id="vRound">0.06</span></label>
    <input type="range" id="round" min="0" max="0.4" step="0.01" value="0.06"></div>
  <div class="row"><label>Hue sweep <span id="vSpeed">0.15</span></label>
    <input type="range" id="speed" min="0" max="1" step="0.01" value="0.15"></div>

  <div class="group">Glow area</div>
  <label class="toggle">Outside area <input type="checkbox" id="outer" checked></label>
  <label class="toggle">Inside area <input type="checkbox" id="inner" checked></label>

  <div class="group">Bloom (post)</div>
  <div class="row"><label>Threshold <span id="vThresh">0.7</span></label>
    <input type="range" id="thresh" min="0" max="3" step="0.05" value="0.7"></div>
  <div class="row"><label>Soft knee <span id="vKnee">0.5</span></label>
    <input type="range" id="knee" min="0.01" max="1" step="0.01" value="0.5"></div>
  <div class="row"><label>Intensity <span id="vBloom">0.85</span></label>
    <input type="range" id="bloom" min="0" max="2.5" step="0.05" value="0.85"></div>
  <div class="row"><label>Radius (spread) <span id="vRadius">1.0</span></label>
    <input type="range" id="radius" min="0.3" max="3" step="0.05" value="1.0"></div>

  <div class="group">Output</div>
  <div class="row"><label>Exposure <span id="vExp">1.1</span></label>
    <input type="range" id="exp" min="0.2" max="3" step="0.05" value="1.1"></div>
  <div class="row"><label>Grain <span id="vGrain">0.04</span></label>
    <input type="range" id="grain" min="0" max="0.15" step="0.005" value="0.04"></div>
  <label class="toggle">Animate <input type="checkbox" id="anim" checked></label>
</div>
<div class="hint"><kbd>H</kbd> ẩn panel · chuột xoay nhẹ</div>
<div class="badge" id="badge">—</div>

<!-- ============ SHADERS ============ -->
<script id="vs" type="x-shader/x-vertex">#version 300 es
layout(location=0) in vec2 p;
out vec2 vUv;
void main(){ vUv = p*0.5+0.5; gl_Position = vec4(p,0.0,1.0); }
</script>

<!-- PASS 0: render neon to HDR (no tonemap; core exceeds 1.0) -->
<script id="fsScene" type="x-shader/x-fragment">#version 300 es
precision highp float;
in vec2 vUv; out vec4 o;
uniform vec2 uRes; uniform float uTime; uniform vec2 uMouse;
uniform float uThick, uGlow, uRound, uSpeed, uInner, uOuter;

float sdRoundBox(vec2 p, vec2 b, float r){
  vec2 q = abs(p)-b+r;
  return min(max(q.x,q.y),0.0)+length(max(q,0.0))-r;
}
vec3 hsv2rgb(vec3 c){
  vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0);
  vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www);
  return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y);
}
vec3 palette(vec2 p, float t){
  float h=(atan(p.y,p.x)/6.2831853)+0.5;
  h=fract(0.04+h*0.92+t);
  return hsv2rgb(vec3(h,0.85,1.0));
}
void main(){
  vec2 uv=(gl_FragCoord.xy*2.0-uRes.xy)/min(uRes.x,uRes.y);
  uv-=(uMouse*2.0-1.0)*0.06;
  float d=sdRoundBox(uv,vec2(0.62),uRound);
  float ad=abs(d);
  float w=uThick*0.01;
  float core=w/(ad+0.0008);
  float g=pow(w/(ad+0.02),1.6);
  float e=max(w*0.5,0.0025);
  float outer=smoothstep(-e,e,d);            // 1 outside the line, 0 inside
  float inner=1.0-outer;                     // 1 inside the line, 0 outside
  float glow=g*(outer*uOuter+inner*uInner);  // directional halo
  vec3 col=palette(uv,uTime*uSpeed);
  vec3 c = col*core*0.6*uGlow + col*glow*0.9*uGlow;   // HDR, can be >> 1
  o=vec4(c,1.0);
}
</script>

<!-- DOWNSAMPLE (Jimenez/COD 13-tap). uPrefilter applies threshold+Karis on the first pass -->
<script id="fsDown" type="x-shader/x-fragment">#version 300 es
precision highp float;
in vec2 vUv; out vec4 o;
uniform sampler2D uTex; uniform vec2 uTexel;
uniform int uPrefilter; uniform float uThreshold; uniform float uKnee;
#define T(dx,dy) texture(uTex, vUv+uTexel*vec2(dx,dy)).rgb
float luma(vec3 c){ return dot(c, vec3(0.2126,0.7152,0.0722)); }
// soft-knee threshold (Unreal-style)
vec3 prefilter(vec3 c){
  float br=max(c.r,max(c.g,c.b));
  float kn=uThreshold*uKnee+1e-5;
  float soft=clamp(br-uThreshold+kn,0.0,2.0*kn);
  soft=soft*soft/(4.0*kn+1e-5);
  float contrib=max(soft, br-uThreshold)/max(br,1e-5);
  return c*contrib;
}
vec3 karisAvg(vec3 a,vec3 b,vec3 c,vec3 d){
  float wa=1.0/(1.0+luma(a)), wb=1.0/(1.0+luma(b));
  float wc=1.0/(1.0+luma(c)), wd=1.0/(1.0+luma(d));
  return (a*wa+b*wb+c*wc+d*wd)/(wa+wb+wc+wd);
}
void main(){
  vec3 a=T(-2.,-2.), b=T(0.,-2.), c=T(2.,-2.);
  vec3 d=T(-1.,-1.), e=T(1.,-1.);
  vec3 f=T(-2.,0.),  g=T(0.,0.),  h=T(2.,0.);
  vec3 i=T(-1.,1.),  j=T(1.,1.);
  vec3 k=T(-2.,2.),  l=T(0.,2.),  m=T(2.,2.);
  vec3 res;
  if(uPrefilter==1){
    // Karis average per box kills fireflies on the bright-pass
    vec3 b0=karisAvg(d,e,i,j);
    vec3 b1=karisAvg(a,b,f,g);
    vec3 b2=karisAvg(b,c,g,h);
    vec3 b3=karisAvg(f,g,k,l);
    vec3 b4=karisAvg(g,h,l,m);
    res=b0*0.5+(b1+b2+b3+b4)*0.125;
    res=prefilter(res);
  } else {
    vec3 b0=(d+e+i+j)*0.25;
    vec3 b1=(a+b+f+g)*0.25;
    vec3 b2=(b+c+g+h)*0.25;
    vec3 b3=(f+g+k+l)*0.25;
    vec3 b4=(g+h+l+m)*0.25;
    res=b0*0.5+(b1+b2+b3+b4)*0.125;
  }
  o=vec4(res,1.0);
}
</script>

<!-- UPSAMPLE (3x3 tent), additively blended into the larger mip -->
<script id="fsUp" type="x-shader/x-fragment">#version 300 es
precision highp float;
in vec2 vUv; out vec4 o;
uniform sampler2D uTex; uniform vec2 uTexel; uniform float uRadius;
#define U(dx,dy) texture(uTex, vUv+uTexel*vec2(dx,dy)*uRadius).rgb
void main(){
  vec3 s = U(-1.,1.)*1.0 + U(0.,1.)*2.0 + U(1.,1.)*1.0
         + U(-1.,0.)*2.0 + U(0.,0.)*4.0 + U(1.,0.)*2.0
         + U(-1.,-1.)*1.0+ U(0.,-1.)*2.0+ U(1.,-1.)*1.0;
  o=vec4(s*(1.0/16.0),1.0);
}
</script>

<!-- COMPOSITE: scene + bloom -> exposure, tonemap, gamma, grain -->
<script id="fsComp" type="x-shader/x-fragment">#version 300 es
precision highp float;
in vec2 vUv; out vec4 o;
uniform sampler2D uScene; uniform sampler2D uBloom;
uniform float uIntensity, uExposure, uGrain, uTime; uniform int uView;
uniform vec2 uRes, uMouse; uniform float uRound, uInner, uOuter;
float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
vec3 aces(vec3 x){ // ACES filmic approximation
  return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14),0.0,1.0);
}
float sdRoundBox(vec2 p, vec2 b, float r){
  vec2 q=abs(p)-b+r; return min(max(q.x,q.y),0.0)+length(max(q,0.0))-r;
}
void main(){
  vec3 scene=texture(uScene,vUv).rgb;
  vec3 bloom=texture(uBloom,vUv).rgb;
  // clip the bloom to the chosen region (inside / outside the square)
  vec2 uv=(gl_FragCoord.xy*2.0-uRes.xy)/min(uRes.x,uRes.y);
  uv-=(uMouse*2.0-1.0)*0.06;
  float d=sdRoundBox(uv,vec2(0.62),uRound);
  float outside=smoothstep(-0.01,0.01,d);   // 1 outside the square
  float inside=1.0-outside;                 // 1 inside the square
  bloom*=clamp(outside*uOuter+inside*uInner,0.0,1.0);
  vec3 c;
  if(uView==1)      c = bloom*uIntensity;          // bloom only
  else if(uView==2) c = scene;                     // raw HDR scene
  else              c = scene + bloom*uIntensity;  // final
  c*=uExposure;
  c=aces(c);
  c=pow(c,vec3(1.0/2.2));
  c+=(hash(gl_FragCoord.xy+uTime)-0.5)*uGrain;
  o=vec4(c,1.0);
}
</script>

<script>
const canvas=document.getElementById('gl');
const gl=canvas.getContext('webgl2',{antialias:false,alpha:false});
const badge=document.getElementById('badge');
if(!gl){ document.body.innerHTML='<p style="color:#fff;padding:24px">WebGL2 không khả dụng</p>'; }

// HDR target support
const extF=gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_float_linear');
const HDR = !!extF;
const FMT = HDR
  ? {internal:gl.RGBA16F, format:gl.RGBA, type:gl.HALF_FLOAT}
  : {internal:gl.RGBA8,   format:gl.RGBA, type:gl.UNSIGNED_BYTE};
badge.textContent = HDR ? 'RGBA16F · HDR' : 'RGBA8 · LDR fallback';

function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s),src);return s;}
const VS=sh(gl.VERTEX_SHADER,document.getElementById('vs').textContent);
function prog(fsId){const p=gl.createProgram();gl.attachShader(p,VS);
  gl.attachShader(p,sh(gl.FRAGMENT_SHADER,document.getElementById(fsId).textContent));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(p));return p;}
const P={ scene:prog('fsScene'), down:prog('fsDown'), up:prog('fsUp'), comp:prog('fsComp') };

// uniform locations
function U(p,names){const m={};names.forEach(n=>m[n]=gl.getUniformLocation(p,n));return m;}
const Us={
  scene:U(P.scene,['uRes','uTime','uMouse','uThick','uGlow','uRound','uSpeed','uInner','uOuter']),
  down :U(P.down ,['uTex','uTexel','uPrefilter','uThreshold','uKnee']),
  up   :U(P.up   ,['uTex','uTexel','uRadius']),
  comp :U(P.comp ,['uScene','uBloom','uIntensity','uExposure','uGrain','uTime','uView','uRes','uMouse','uRound','uInner','uOuter']),
};

// fullscreen triangle
const vao=gl.createVertexArray(); gl.bindVertexArray(vao);
const vbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,vbo);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 3,-1, -1,3]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

// render targets
function makeTarget(w,h){
  const tex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,FMT.internal,w,h,0,FMT.format,FMT.type,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fbo=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  return {tex,fbo,w,h};
}
let scene=null, mips=[];
function buildTargets(){
  [scene,...mips].forEach(t=>{ if(t){gl.deleteTexture(t.tex);gl.deleteFramebuffer(t.fbo);} });
  scene=makeTarget(canvas.width,canvas.height);
  mips=[];
  let w=Math.max(1,canvas.width>>1), h=Math.max(1,canvas.height>>1);
  for(let i=0;i<7 && Math.min(w,h)>4;i++){ mips.push(makeTarget(w,h)); w=Math.max(1,w>>1); h=Math.max(1,h>>1); }
}

function bindTex(unit,tex){ gl.activeTexture(gl.TEXTURE0+unit); gl.bindTexture(gl.TEXTURE_2D,tex); }
function drawTo(target){
  if(target){ gl.bindFramebuffer(gl.FRAMEBUFFER,target.fbo); gl.viewport(0,0,target.w,target.h); }
  else { gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,canvas.width,canvas.height); }
  gl.drawArrays(gl.TRIANGLES,0,3);
}

// ---------- params / UI ----------
const params={thick:2.2,glow:0.9,round:0.06,speed:0.15,inner:1,outer:1,
  thresh:0.7,knee:0.5,bloom:0.85,radius:1.0,exp:1.1,grain:0.04,anim:true,view:0};
const mouse={x:0.5,y:0.5};
[['thick','vThick'],['glow','vGlow'],['round','vRound'],['speed','vSpeed'],
 ['thresh','vThresh'],['knee','vKnee'],['bloom','vBloom'],['radius','vRadius'],
 ['exp','vExp'],['grain','vGrain']].forEach(([id,out])=>{
  const el=document.getElementById(id), o=document.getElementById(out);
  el.addEventListener('input',()=>{params[id]=parseFloat(el.value);o.textContent=el.value;});
});
document.getElementById('anim').addEventListener('change',e=>params.anim=e.target.checked);
document.getElementById('outer').addEventListener('change',e=>params.outer=e.target.checked?1:0);
document.getElementById('inner').addEventListener('change',e=>params.inner=e.target.checked?1:0);
document.querySelectorAll('#view button').forEach(b=>b.addEventListener('click',()=>{
  params.view=parseInt(b.dataset.v);
  document.querySelectorAll('#view button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
}));
addEventListener('mousemove',e=>{mouse.x=e.clientX/innerWidth;mouse.y=1-e.clientY/innerHeight;});
addEventListener('keydown',e=>{ if(e.key.toLowerCase()==='h')document.getElementById('panel').classList.toggle('hidden'); });

function resize(){
  const dpr=Math.min(devicePixelRatio||1,2);
  canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr);
  buildTargets();
}
addEventListener('resize',resize); resize();

// ---------- render loop ----------
let t0=performance.now(), t=0;
function frame(now){
  if(params.anim) t+=(now-t0)/1000; t0=now;
  gl.bindVertexArray(vao);
  gl.disable(gl.BLEND);

  // PASS 0 — neon to HDR scene buffer
  gl.useProgram(P.scene);
  gl.uniform2f(Us.scene.uRes,canvas.width,canvas.height);
  gl.uniform1f(Us.scene.uTime,t);
  gl.uniform2f(Us.scene.uMouse,mouse.x,mouse.y);
  gl.uniform1f(Us.scene.uThick,params.thick);
  gl.uniform1f(Us.scene.uGlow,params.glow);
  gl.uniform1f(Us.scene.uRound,params.round);
  gl.uniform1f(Us.scene.uSpeed,params.speed);
  gl.uniform1f(Us.scene.uInner,params.inner);
  gl.uniform1f(Us.scene.uOuter,params.outer);
  drawTo(scene);

  // PASS 1 — downsample chain (first = prefilter w/ threshold + Karis)
  gl.useProgram(P.down);
  gl.uniform1i(Us.down.uTex,0);
  for(let i=0;i<mips.length;i++){
    const src = i===0 ? scene : mips[i-1];
    const dst = mips[i];
    gl.uniform2f(Us.down.uTexel,1/src.w,1/src.h);
    gl.uniform1i(Us.down.uPrefilter, i===0?1:0);
    gl.uniform1f(Us.down.uThreshold,params.thresh);
    gl.uniform1f(Us.down.uKnee,params.knee);
    bindTex(0,src.tex);
    drawTo(dst);
  }

  // PASS 2 — upsample chain (additive tent, smallest -> mip0)
  gl.enable(gl.BLEND); gl.blendFunc(gl.ONE,gl.ONE);
  gl.useProgram(P.up);
  gl.uniform1i(Us.up.uTex,0);
  gl.uniform1f(Us.up.uRadius,params.radius);
  for(let i=mips.length-1;i>0;i--){
    const src=mips[i], dst=mips[i-1];
    gl.uniform2f(Us.up.uTexel,1/src.w,1/src.h);
    bindTex(0,src.tex);
    drawTo(dst);                 // adds onto dst's existing downsampled content
  }
  gl.disable(gl.BLEND);

  // PASS 3 — composite to screen
  gl.useProgram(P.comp);
  gl.uniform1i(Us.comp.uScene,0); bindTex(0,scene.tex);
  gl.uniform1i(Us.comp.uBloom,1); bindTex(1,mips[0].tex);
  gl.uniform1f(Us.comp.uIntensity,params.bloom);
  gl.uniform1f(Us.comp.uExposure,params.exp);
  gl.uniform1f(Us.comp.uGrain,params.grain);
  gl.uniform1f(Us.comp.uTime,t);
  gl.uniform1i(Us.comp.uView,params.view);
  gl.uniform2f(Us.comp.uRes,canvas.width,canvas.height);
  gl.uniform2f(Us.comp.uMouse,mouse.x,mouse.y);
  gl.uniform1f(Us.comp.uRound,params.round);
  gl.uniform1f(Us.comp.uInner,params.inner);
  gl.uniform1f(Us.comp.uOuter,params.outer);
  drawTo(null);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
