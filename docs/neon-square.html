<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Square — SDF Shader</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0a0a0c; overflow: hidden;
    font-family: "SF Mono", "JetBrains Mono", ui-monospace, monospace; }
  #gl { display: block; width: 100vw; height: 100vh; }
  .panel {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(14,14,18,0.72); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 16px 18px; width: 250px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    transition: transform .25s ease, opacity .25s ease;
  }
  .panel.hidden { transform: translateX(-110%); opacity: 0; }
  .panel h1 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: #8b8b96; font-weight: 600; margin-bottom: 14px; }
  .row { margin-bottom: 13px; }
  .row label { display: flex; justify-content: space-between; font-size: 11px;
    color: #b8b8c4; margin-bottom: 6px; letter-spacing: .3px; }
  .row label span { color: #6e6e7a; font-variant-numeric: tabular-nums; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 3px;
    background: rgba(255,255,255,0.12); border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none;
    width: 13px; height: 13px; border-radius: 50%;
    background: linear-gradient(135deg,#ff5e3a,#5e7bff); cursor: pointer;
    box-shadow: 0 0 8px rgba(120,120,255,0.6); }
  input[type=range]::-moz-range-thumb { width: 13px; height: 13px; border: none;
    border-radius: 50%; background: #6e7bff; cursor: pointer; }
  .presets { display: flex; gap: 6px; margin-bottom: 14px; }
  .presets button { flex: 1; font: inherit; font-size: 10px; padding: 7px 0;
    color: #c4c4d0; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; cursor: pointer;
    letter-spacing: .3px; transition: all .15s; }
  .presets button:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .presets button.active { background: rgba(110,123,255,0.22);
    border-color: rgba(110,123,255,0.5); color: #fff; }
  .toggle { display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: #b8b8c4; cursor: pointer; }
  .toggle input { accent-color: #6e7bff; width: 15px; height: 15px; cursor: pointer; }
  .hint { position: fixed; bottom: 14px; left: 16px; z-index: 10;
    font-size: 10px; color: #4a4a55; letter-spacing: .5px; }
  .hint kbd { background: rgba(255,255,255,0.08); padding: 1px 5px;
    border-radius: 4px; color: #8b8b96; }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="panel" id="panel">
  <h1>Neon Square · SDF</h1>
  <div class="presets" id="presets">
    <button data-p="photo" class="active">Như ảnh</button>
    <button data-p="cyber">Cyber</button>
    <button data-p="ice">Ice</button>
  </div>
  <div class="row">
    <label>Độ dày viền <span id="vThick">2.2</span></label>
    <input type="range" id="thick" min="0.4" max="6" step="0.1" value="2.2">
  </div>
  <div class="row">
    <label>Cường độ glow <span id="vGlow">0.9</span></label>
    <input type="range" id="glow" min="0.1" max="3" step="0.05" value="0.9">
  </div>
  <div class="row">
    <label>Bo góc <span id="vRound">0.06</span></label>
    <input type="range" id="round" min="0" max="0.4" step="0.01" value="0.06">
  </div>
  <div class="row">
    <label>Bloom nền <span id="vBloom">0.55</span></label>
    <input type="range" id="bloom" min="0" max="1.5" step="0.05" value="0.55">
  </div>
  <div class="row">
    <label>Tốc độ sweep <span id="vSpeed">0.15</span></label>
    <input type="range" id="speed" min="0" max="1" step="0.01" value="0.15">
  </div>
  <div class="row">
    <label>Grain (noise) <span id="vGrain">0.04</span></label>
    <input type="range" id="grain" min="0" max="0.15" step="0.005" value="0.04">
  </div>
  <label class="toggle">Animate
    <input type="checkbox" id="anim" checked>
  </label>
</div>
<div class="hint"><kbd>H</kbd> ẩn panel · chuột để xoay nhẹ</div>

<script type="x-shader/x-fragment" id="frag">#version 300 es
precision highp float;
out vec4 outColor;

uniform vec2  uRes;
uniform float uTime;
uniform vec2  uMouse;
uniform float uThick;    // line thickness
uniform float uGlow;     // glow intensity
uniform float uRound;    // corner radius
uniform float uBloom;    // ambient bloom into bg
uniform float uSpeed;    // hue sweep speed
uniform float uGrain;    // film grain
uniform int   uPalette;  // 0 photo, 1 cyber, 2 ice

// signed distance to a rounded box
float sdRoundBox(vec2 p, vec2 b, float r){
  vec2 q = abs(p) - b + r;
  return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r;
}

vec3 hsv2rgb(vec3 c){
  vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

float hash(vec2 p){
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

// map a point to a color depending on palette
vec3 palette(vec2 p, float t){
  float ang = atan(p.y, p.x);              // -pi..pi  (conic)
  float h = (ang / 6.2831853) + 0.5;       // 0..1 hue around center
  if(uPalette == 0){
    // "như ảnh": cam trên-trái -> magenta dưới -> xanh phải
    h = fract(0.04 + h * 0.92 + t);
    return hsv2rgb(vec3(h, 0.85, 1.0));
  } else if(uPalette == 1){
    // cyber: cyan/magenta/violet
    h = fract(0.55 + h * 0.55 + t);
    return hsv2rgb(vec3(h, 0.95, 1.0));
  } else {
    // ice: blue -> white -> teal
    h = fract(0.50 + h * 0.22 + t);
    return hsv2rgb(vec3(h, 0.6, 1.0));
  }
}

void main(){
  vec2 uv = (gl_FragCoord.xy * 2.0 - uRes.xy) / min(uRes.x, uRes.y);

  // subtle parallax from mouse
  vec2 m = (uMouse * 2.0 - 1.0) * 0.06;
  uv -= m;

  float d = sdRoundBox(uv, vec2(0.62), uRound);
  float ad = abs(d);

  // neon core + inverse-distance falloff
  float w = uThick * 0.01;
  float core = w / (ad + 0.0008);          // bright thin line
  float glow = pow(w / (ad + 0.02), 1.6);  // soft halo

  float sweep = uTime * uSpeed;
  vec3 col = palette(uv, sweep);

  // combine: chói ở lõi, dịu ở quầng
  vec3 result = col * core * 0.35 * uGlow;
  result += col * glow * 0.9 * uGlow;

  // bloom lan vào nền (chỉ phía trong & quanh khung)
  float fill = smoothstep(0.9, -0.4, d);
  result += col * fill * uBloom * 0.18;

  // tone map (Reinhard) để giữ màu khi over-bright
  result = result / (result + vec3(0.6));
  result = pow(result, vec3(0.85));        // gamma lift

  // film grain
  float g = (hash(gl_FragCoord.xy + uTime) - 0.5) * uGrain;
  result += g;

  outColor = vec4(result, 1.0);
}
</script>

<script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', { antialias: true });
if(!gl){ document.body.innerHTML = '<p style="color:#fff;padding:20px">Trình duyệt không hỗ trợ WebGL2</p>'; }

const vsSrc = `#version 300 es
in vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }`;
const fsSrc = document.getElementById('frag').textContent;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vsSrc));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsSrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const U = {};
['uRes','uTime','uMouse','uThick','uGlow','uRound','uBloom','uSpeed','uGrain','uPalette']
  .forEach(n => U[n] = gl.getUniformLocation(prog, n));

const params = { thick:2.2, glow:0.9, round:0.06, bloom:0.55, speed:0.15, grain:0.04, palette:0, anim:true };
const mouse = { x:0.5, y:0.5 };

// bind sliders
const sliders = ['thick','glow','round','bloom','speed','grain'];
sliders.forEach(id => {
  const el = document.getElementById(id);
  const out = document.getElementById('v'+id.charAt(0).toUpperCase()+id.slice(1));
  el.addEventListener('input', () => { params[id] = parseFloat(el.value); out.textContent = el.value; });
});
document.getElementById('anim').addEventListener('change', e => params.anim = e.target.checked);

// presets
const PRESETS = {
  photo: { thick:2.2, glow:0.9, round:0.06, bloom:0.55, speed:0.15, grain:0.04, palette:0 },
  cyber: { thick:1.6, glow:1.4, round:0.2,  bloom:0.7,  speed:0.35, grain:0.02, palette:1 },
  ice:   { thick:3.0, glow:0.7, round:0.02, bloom:0.4,  speed:0.08, grain:0.05, palette:2 },
};
document.querySelectorAll('#presets button').forEach(b => {
  b.addEventListener('click', () => {
    const p = PRESETS[b.dataset.p];
    Object.assign(params, p);
    document.querySelectorAll('#presets button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    sliders.forEach(id => {
      const el = document.getElementById(id);
      el.value = params[id];
      document.getElementById('v'+id.charAt(0).toUpperCase()+id.slice(1)).textContent = params[id];
    });
  });
});

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX / window.innerWidth;
  mouse.y = 1 - e.clientY / window.innerHeight;
});
window.addEventListener('keydown', e => {
  if(e.key.toLowerCase() === 'h') document.getElementById('panel').classList.toggle('hidden');
});

function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize); resize();

let t0 = performance.now(), t = 0;
function frame(now){
  if(params.anim) t += (now - t0) / 1000;
  t0 = now;
  gl.uniform2f(U.uRes, canvas.width, canvas.height);
  gl.uniform1f(U.uTime, t);
  gl.uniform2f(U.uMouse, mouse.x, mouse.y);
  gl.uniform1f(U.uThick, params.thick);
  gl.uniform1f(U.uGlow, params.glow);
  gl.uniform1f(U.uRound, params.round);
  gl.uniform1f(U.uBloom, params.bloom);
  gl.uniform1f(U.uSpeed, params.speed);
  gl.uniform1f(U.uGrain, params.grain);
  gl.uniform1i(U.uPalette, params.palette);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
